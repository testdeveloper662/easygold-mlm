<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{header}}</title>
    <style>
        /* --- A4 / print settings --- */
        @page {
            size: A4;
            margin: 20mm;
        }

        html,
        body {
            width: 210mm;
            height: 297mm;
            /* margin: 0 auto; */
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body {
            line-height: 1.6;
            color: #111;
        }
    </style>
</head>

<body>
    {{body}}
</body>

</html>
